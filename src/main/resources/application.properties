spring.application.name=mtg-price-comparator


spring.jpa.hibernate.ddl-auto=update

# SQL statement logging (production-safe default: off; was left enabled for the
# IgnoreCase-predicate investigation documented in card_price_history_index.sql)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

#para render
#spring.datasource.url=${SPRING_DATASOURCE_URL}
#spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
#spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
#server.port=${PORT:8080}

#para uso local
spring.datasource.url=jdbc:postgresql://localhost:5432/mtg_price_comparator
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.port=8080

# Redis connection (env-var driven, defaults match the local docker mtg-redis container)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# MTGStocks integration
mtgstocks.base-url=${MTGSTOCKS_BASE_URL:https://www.mtgstocks.com}
mtgstocks.sets-path=${MTGSTOCKS_SETS_PATH:/sets}
mtgstocks.prints-path=${MTGSTOCKS_PRINTS_PATH:/prints}

# Request used to load the /sets index (resolves an edition name to its set URL)
mtgstocks.sets-index.user-agent=${MTGSTOCKS_SETS_INDEX_USER_AGENT:Mozilla/5.0}
mtgstocks.sets-index.timeout-ms=${MTGSTOCKS_SETS_INDEX_TIMEOUT_MS:10000}
mtgstocks.sets-index.follow-redirects=${MTGSTOCKS_SETS_INDEX_FOLLOW_REDIRECTS:true}

# Request used to load an individual set's card-list page (Angular-rendered, heavier)
mtgstocks.set-detail.user-agent=${MTGSTOCKS_SET_DETAIL_USER_AGENT:Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/137.0.0.0 Safari/537.36}
mtgstocks.set-detail.timeout-ms=${MTGSTOCKS_SET_DETAIL_TIMEOUT_MS:60000}
mtgstocks.set-detail.follow-redirects=${MTGSTOCKS_SET_DETAIL_FOLLOW_REDIRECTS:true}

# Debug logging toggles (production-safe defaults: off)
mtgstocks.debug-cards=${MTGSTOCKS_DEBUG_CARDS:false}
mtgstocks.debug-json=${MTGSTOCKS_DEBUG_JSON:false}

